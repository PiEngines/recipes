<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" width="1200" height="900" role="img" aria-label="Pflanzen-Platzhalter">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6f8352"/>
      <stop offset="0.55" stop-color="#5a7048"/>
      <stop offset="1" stop-color="#3f5232"/>
    </linearGradient>
    <linearGradient id="leaf" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f3ecd8"/>
      <stop offset="1" stop-color="#e5dcc2"/>
    </linearGradient>
  </defs>

  <!-- Hintergrund -->
  <rect width="1200" height="900" fill="url(#bg)"/>

  <!-- dezente Vignette -->
  <rect width="1200" height="900" fill="#000000" opacity="0.06"/>

  <!-- Kräuter-Sprig, zentriert mit großzügigem Rand (crop-sicher) -->
  <g transform="translate(600 470)" fill="none" stroke="url(#leaf)" stroke-width="9" stroke-linecap="round" opacity="0.92">
    <!-- Stiel -->
    <path d="M0 200 C 0 90, 0 -40, 0 -210" />
    <!-- Blattpaare (von unten nach oben, kleiner werdend) -->
    <g fill="url(#leaf)" stroke="none" opacity="0.95">
      <!-- Paar 1 -->
      <path d="M0 150 C -70 120, -120 150, -150 190 C -100 195, -45 190, 0 150 Z"/>
      <path d="M0 150 C  70 120,  120 150,  150 190 C  100 195,  45 190, 0 150 Z"/>
      <!-- Paar 2 -->
      <path d="M0 70 C -78 40, -132 68, -164 108 C -110 114, -50 108, 0 70 Z"/>
      <path d="M0 70 C  78 40,  132 68,  164 108 C  110 114,  50 108, 0 70 Z"/>
      <!-- Paar 3 -->
      <path d="M0 -15 C -70 -45, -120 -18, -150 22 C -100 28, -45 22, 0 -15 Z"/>
      <path d="M0 -15 C  70 -45,  120 -18,  150 22 C  100 28,  45 22, 0 -15 Z"/>
      <!-- Paar 4 -->
      <path d="M0 -95 C -56 -122, -98 -98, -124 -62 C -80 -58, -34 -62, 0 -95 Z"/>
      <path d="M0 -95 C  56 -122,  98 -98,  124 -62 C  80 -58,  34 -62, 0 -95 Z"/>
      <!-- Spitze -->
      <path d="M0 -170 C -34 -196, -58 -176, -74 -146 C -44 -142, -16 -150, 0 -170 Z"/>
      <path d="M0 -170 C  34 -196,  58 -176,  74 -146 C  44 -142,  16 -150, 0 -170 Z"/>
      <path d="M0 -235 C -20 -250, -30 -230, -30 -206 C -14 -206, 0 -216, 0 -235 Z"/>
      <path d="M0 -235 C  20 -250,  30 -230,  30 -206 C  14 -206, 0 -216, 0 -235 Z"/>
    </g>
  </g>

  <!-- kleiner Terrakotta-Akzent (Punkt), passend zur Palette -->
  <circle cx="600" cy="232" r="10" fill="#c85030" opacity="0.9"/>
</svg>
